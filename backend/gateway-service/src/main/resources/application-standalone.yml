spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: master-service
          uri: ${MASTER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/master/**
        - id: academic-service
          uri: ${ACADEMIC_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/academic/**
        - id: workflow-service
          uri: ${WORKFLOW_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/workflow/**
        - id: billing-service
          uri: ${BILLING_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/billing/**
        - id: notify-service
          uri: ${NOTIFY_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/notify/**
