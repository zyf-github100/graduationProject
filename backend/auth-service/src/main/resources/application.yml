server:
  port: ${SERVER_PORT:8081}

spring:
  profiles:
    default: standalone
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:18111}/${POSTGRES_DB:school_erp}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:school_erp}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:school_erp}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:18112}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

management:
  endpoints:
    web:
      exposure:
        include: health,info

school-erp:
  security:
    jwt-secret: school-erp-demo-jwt-secret-for-graduation-project-2026
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
